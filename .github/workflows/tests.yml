name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        # Laravel 10 and 11 are past their security-support window: every published
        # laravel/framework release in those lines is flagged by a security advisory,
        # so Composer refuses to resolve them at all. Only 12+ is installable today.
        laravel: ['12', '13']
        include:
          - laravel: '12'
            testbench: '10.*'
          - laravel: '13'
            testbench: '11.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    # New PHP and Laravel releases are allowed to fail until the ecosystem catches up
    continue-on-error: ${{ matrix.php == '8.5' || matrix.laravel == '13' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}.0" "illuminate/http:^${{ matrix.laravel }}.0" "illuminate/cache:^${{ matrix.laravel }}.0" "illuminate/contracts:^${{ matrix.laravel }}.0" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
